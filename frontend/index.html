<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockSense AI</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Serverless ML Inventory Forecasting</p>
        <h1>StockSense AI</h1>
      </div>
      <div class="status" id="apiStatus">API not connected</div>
    </header>

    <main class="layout">
      <section class="panel forecast-panel" aria-labelledby="forecastTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Prediction</p>
            <h2 id="forecastTitle">Reorder Recommendation</h2>
          </div>
          <button class="secondary-button" id="loadItemsButton" type="button">Sync Items</button>
        </div>

        <form id="predictForm" class="form-grid">
          <label>
            <span class="field-label">Item <button class="info-button" type="button" data-info-key="Item_Name" aria-label="Explain Item">i</button></span>
            <select id="Item_Name" name="Item_Name"></select>
          </label>
          <label>
            <span class="field-label">Category <button class="info-button" type="button" data-info-key="Category" aria-label="Explain Category">i</button></span>
            <input name="Category" id="Category" required>
          </label>
          <label>
            <span class="field-label">Subcategory <button class="info-button" type="button" data-info-key="Subcategory" aria-label="Explain Subcategory">i</button></span>
            <input name="Subcategory" id="Subcategory" required>
          </label>
          <label>
            <span class="field-label">Unit <button class="info-button" type="button" data-info-key="Unit" aria-label="Explain Unit">i</button></span>
            <input name="Unit" id="Unit" required>
          </label>
          <label>
            <span class="field-label">Current Stock <button class="info-button" type="button" data-info-key="Current_Stock" aria-label="Explain Current Stock">i</button></span>
            <input name="Current_Stock" id="Current_Stock" type="number" step="0.01" min="0" required>
          </label>
          <label>
            <span class="field-label">Reorder Level <button class="info-button" type="button" data-info-key="Reorder_Level" aria-label="Explain Reorder Level">i</button></span>
            <input name="Reorder_Level" id="Reorder_Level" type="number" step="0.01" min="0" required>
          </label>
          <label>
            <span class="field-label">Daily Usage <button class="info-button" type="button" data-info-key="Daily_Usage" aria-label="Explain Daily Usage">i</button></span>
            <input name="Daily_Usage" id="Daily_Usage" type="number" step="0.01" min="0" required>
          </label>
          <label>
            <span class="field-label">Lead Time <button class="info-button" type="button" data-info-key="Lead_Time" aria-label="Explain Lead Time">i</button></span>
            <input name="Lead_Time" id="Lead_Time" type="number" step="1" min="0" required>
          </label>
          <label>
            <span class="field-label">Price Per Unit <button class="info-button" type="button" data-info-key="Price_per_Unit" aria-label="Explain Price Per Unit">i</button></span>
            <input name="Price_per_Unit" id="Price_per_Unit" type="number" step="0.01" min="0" required>
          </label>
          <label>
            <span class="field-label">Seasonal Factor <button class="info-button" type="button" data-info-key="Seasonal_Factor" aria-label="Explain Seasonal Factor">i</button></span>
            <input name="Seasonal_Factor" id="Seasonal_Factor" type="number" step="0.01" min="0" required>
          </label>
          <label>
            <span class="field-label">Waste Percentage <button class="info-button" type="button" data-info-key="Waste_Percentage" aria-label="Explain Waste Percentage">i</button></span>
            <input name="Waste_Percentage" id="Waste_Percentage" type="number" step="0.01" min="0" required>
          </label>
          <button class="primary-button" type="submit">Predict Order</button>
        </form>

        <div class="info-popover" id="infoPopover" hidden role="dialog" aria-live="polite">
          <button class="info-close" id="infoClose" type="button" aria-label="Close parameter explanation">x</button>
          <h3 id="infoTitle"></h3>
          <p id="infoBody"></p>
        </div>

        <div class="result" id="predictionResult">
          <span>Recommended order</span>
          <strong>Run a prediction</strong>
          <p>Choose an item and submit the form to see the reorder amount.</p>
        </div>
      </section>

      <section class="panel chat-panel" aria-labelledby="chatTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Assistant</p>
            <h2 id="chatTitle">Inventory Chat</h2>
          </div>
        </div>

        <div class="chat-log" id="chatLog" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input id="chatMessage" type="text" placeholder="How much milk should I buy next month?" required>
          <button class="primary-button" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="script.js?v=20260530-aws"></script>
  </body>
</html>
