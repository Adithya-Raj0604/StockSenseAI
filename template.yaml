AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: StockSense AI serverless backend and static frontend hosting.

Parameters:
  AllowedCorsOrigins:
    Type: String
    Default: '*'
    Description: Comma-separated frontend origins allowed to call the API.

Globals:
  Function:
    Timeout: 30
    MemorySize: 2048
    Architectures:
      - x86_64
    Environment:
      Variables:
        CORS_ORIGINS: !Ref AllowedCorsOrigins

Resources:
  StockSenseApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedCorsOrigins
        AllowHeaders:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  StockSenseFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: .
      Dockerfile: backend/Dockerfile
    Properties:
      PackageType: Image
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref StockSenseApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref StockSenseApi
            Path: /
            Method: ANY

  StockSenseFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${StockSenseFunction}
      RetentionInDays: 14

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

Outputs:
  ApiUrl:
    Description: API Gateway URL for the StockSense backend.
    Value: !Sub https://${StockSenseApi}.execute-api.${AWS::Region}.amazonaws.com
  FrontendBucketName:
    Description: S3 bucket for static frontend assets.
    Value: !Ref FrontendBucket
  FrontendDistributionDomain:
    Description: CloudFront domain for the static site.
    Value: !GetAtt FrontendDistribution.DomainName

